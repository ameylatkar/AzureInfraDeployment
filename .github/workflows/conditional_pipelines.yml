name: Conditional Tasks Execution

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy application'
        required: true
        default: 'false'

      user_name:
        description: 'Enter User Name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build
        run: echo "Building..."

      - name: Deploy
        if: github.event.inputs.deploy == 'true'
        run: echo "Deploying..."

      - name: PrintName
        if: ${{ inputs.user_name }}
        run: |  
            echo "User Name: ${{ inputs.user_name }}"

        
