name: DeployAzureInfrastructure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy ARM template to Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run PowerShell Script
        shell: pwsh
        run: |
          ./Powershell/Get-AppConfig.ps1 `
            -FirstName "Amey" `
            -LastName "Latkar"
      
      - name: Get Azure App Configuration
        uses: flcdrg/get-azure-app-configuration-action@v6.0.16
        with:
          resourceGroup: freeresource
          appConfigurationName: demo-dev-eun-aac
          keyFilter: DemoComponent:Settings:*
          labelFilter: DEV


